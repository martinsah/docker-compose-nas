services:
  nginx-proxy-manager:
    container_name: npm
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
      # Map IPv6 port 80 dynamically across host changes
      - target: 80
        published: 80
        host_ip: "::"
        mode: ingress
      # Map IPv6 port 443 dynamically across host changes
      - target: 443
        published: 443
        host_ip: "::"
        mode: ingress
    volumes:
      - ${CONFIG_ROOT}/nginx-proxy-manager/data:/data
      - ${CONFIG_ROOT}/nginx-proxy-manager/letsencrypt:/etc/letsencrypt
    networks:
      - vpn_network
      - default
  firefox:
    image: lscr.io/linuxserver/firefox:latest
    network_mode: "service:vpn"
    container_name: firefox
    security_opt:
      - seccomp:unconfined #optional
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - FIREFOX_CLI=https://www.linuxserver.io/ #optional
      - SELKIES_SCALING_DPI="144"
      - GDK_SCALE=2
    volumes:
      - ${CONFIG_ROOT}/firefox:/config
      - ${DOWNLOAD2_ROOT}/tk/qb2-torrent-files:/data
      - ${DOWNLOAD2_ROOT}:/data_media
    shm_size: "1gb"
    restart: unless-stopped
  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    networks:
      - default
      - vpn_network
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - AUTO_UPDATE=true #optional
      - RUN_OPTS= #optional
    volumes:
      - ${CONFIG_ROOT}/jackett:/config
      - ${DATA_ROOT}/jackett:/downloads
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    labels:
      - homepage.group=Download
      - homepage.name=Jackett
      - homepage.icon=jackett.png
      - homepage.api_key=${JACKETT_API_KEY}
      - homepage.href=https://jackett.${HOSTNAME}
      - homepage.description=Meta Indexer
      - homepage.weight=1
      - homepage.widget.type=jackett
      - homepage.widget.url=http://jackett:9117/
      - homepage.widget.key=${JACKETT_API_KEY}
#  flaresolverr:
#    image: ghcr.io/flaresolverr/flaresolverr:latest
#    container_name: flaresolverr
#    environment:
#      - LOG_LEVEL=${LOG_LEVEL:-info}  # Sets the logging level (e.g., info, debug)
#      - LOG_HTML=${LOG_HTML:-false} # Logs the HTML if true (for debugging)

#    ports:
#      - "${PORT:-8191}:8191" # Maps port 8191 in the container to your host machine
#    restart: unless-stopped
#    networks:
#      - vpn_network
#      - default
  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    networks:
      - vpn_network
      - default
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/radarr:/config
      - ${DATA_ROOT}:/data
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:7878/radarr/ping"]
      interval: 30s
      retries: 10
    labels:
      - homepage.group=Media
      - homepage.name=Radarr
      - homepage.icon=radarr.png
      - homepage.href=https://radarr.${HOSTNAME}
      - homepage.description=Movies management
      - homepage.weight=1
      - homepage.widget.type=radarr
      - homepage.widget.url=http://radarr:7878/radarr
      - homepage.widget.key=${RADARR_API_KEY}

  lidarr:
    image: lscr.io/linuxserver/lidarr
    container_name: lidarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/lidarr:/config
      - ${DATA_ROOT}:/data
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    ports:
      - "8686:8686"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8686/lidarr/ping"]
      interval: 30s
      retries: 10
    labels:
      - homepage.group=Media
      - homepage.name=Lidarr
      - homepage.icon=lidarr.png
      - homepage.href=https://lidarr.${HOSTNAME}
      - homepage.description=Music management
      - homepage.weight=2
      - homepage.widget.type=lidarr
      - homepage.widget.url=http://lidarr:8686
      - homepage.widget.key=${LIDARR_API_KEY}
    profiles:
      - lidarr
    networks:
      - default

  vpn:
    image: linuxserver/wireguard
    container_name: vpn
    volumes:
      - ${CONFIG_ROOT:-.}/wireguard:/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - QBT_USER=${QBITTORRENT_USERNAME}
      - QBT_PASS=${QBITTORRENT_PASSWORD}
      - LOCAL_NETWORK=${PIA_LOCAL_NETWORK}
      - PORT_FORWARDING=1
      - PORT_PERSIST=1
      - PORT_SCRIPT=/pia-shared/portupdate-qbittorrent.sh
      - FIREWALL=0
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.default.disable_ipv6=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.lo.disable_ipv6=1
    networks:
      - default
      - vpn_network
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: always
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    networks:
      - vpn_network
      - default
    environment:
      - HOMEPAGE_VAR_TITLE=${HOMEPAGE_VAR_TITLE}
      - HOMEPAGE_VAR_SEARCH_PROVIDER=${HOMEPAGE_VAR_SEARCH_PROVIDER}
      - HOMEPAGE_VAR_HEADER_STYLE=${HOMEPAGE_VAR_HEADER_STYLE}
      - HOMEPAGE_VAR_WEATHER_CITY=${HOMEPAGE_VAR_WEATHER_CITY}
      - HOMEPAGE_VAR_WEATHER_LAT=${HOMEPAGE_VAR_WEATHER_LAT}
      - HOMEPAGE_VAR_WEATHER_LONG=${HOMEPAGE_VAR_WEATHER_LONG}
      - HOMEPAGE_VAR_WEATHER_TIME=${TIMEZONE}
      - HOMEPAGE_VAR_WEATHER_UNIT=${HOMEPAGE_VAR_WEATHER_UNIT}
      - HOMEPAGE_ALLOWED_HOSTS=*
    volumes:
      - ${CONFIG_ROOT:-.}/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_ROOT}:/data
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    command:
      [sh, -c, "cp -n /app/config/tpl/*.yaml /app/config && node server.js"]
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sabnzbd:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    networks:
      - vpn_network
      - default
    ports:
      - "${PORT:-8080}:8080"
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    labels:
      - homepage.group=Download
      - homepage.name=Sabnzbd
      - homepage.icon=sabnzbd.png
      - homepage.href=https://sabnzbd.${HOSTNAME}
      - homepage.description=Usenet client
      - homepage.weight=2
      - homepage.widget.type=sabnzbd
      - homepage.widget.url=http://sabnzbd:8085
      - homepage.widget.key=${SABNZBD_API_KEY}
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_ROOT:-.}/qbittorrent:/config
      - ${DOWNLOAD_ROOT}:/data/torrents
    network_mode: "service:vpn"
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    labels:
      - homepage.group=Download
      - homepage.name=qBittorrent
      - homepage.icon=qbittorrent.png
      - homepage.href=https://qbittorrent.${HOSTNAME}
      - homepage.description=Bittorrent client
      - homepage.weight=2
      - homepage.widget.type=qbittorrent
      - homepage.widget.url=http://vpn:8080
      - homepage.widget.username=${QBITTORRENT_USERNAME}
      - homepage.widget.password=${QBITTORRENT_PASSWORD}

  qb2:
    image: qbittorrentofficial/qbittorrent-nox:latest
    container_name: qb2
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - QBT_WEBUI_PORT=8181
      - QBT_LEGAL_NOTICE=confirm
    volumes:
      - ${CONFIG_ROOT:-.}/qb2:/config
      - ${DOWNLOAD2_ROOT}:/downloads
    network_mode: "service:vpn"
    restart: unless-stopped
    labels:
      - homepage.group=Download
      - homepage.name=qBittorrent2
      - homepage.icon=qbittorrent.png
      - homepage.href=https://qb2.${HOSTNAME}
      - homepage.description=Bittorrent client
      - homepage.weight=2
      - homepage.widget.type=qbittorrent
      - homepage.widget.url=http://vpn:8181
      - homepage.widget.username=${QBITTORRENT2_USERNAME}
      - homepage.widget.password=${QBITTORRENT2_PASSWORD}
  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    networks:
      - vpn_network
      - default
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/sonarr:/config
      - ${DATA_ROOT}:/data
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8989/sonarr/ping"]
      interval: 30s
      retries: 10
    labels:
      - homepage.group=Media
      - homepage.name=Sonarr
      - homepage.icon=sonarr.png
      - homepage.href=https://sonarr.${HOSTNAME}
      - homepage.description=Series management
      - homepage.weight=0
      - homepage.widget.type=sonarr
      - homepage.widget.url=http://sonarr:8989/sonarr
      - homepage.widget.key=${SONARR_API_KEY}

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    networks:
      - vpn_network
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - JELLYFIN_PublishedServerUrl=${HOSTNAME}/jellyfin
    volumes:
      - ${CONFIG_ROOT:-.}/jellyfin:/config
      - ${DATA_ROOT}:/data
    ports:
      - "7359:7359/udp"
      - "1900:1900/udp"
    deploy:
      resources:
        limits:
          cpus: '4'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8096/jellyfin/health"]
      interval: 30s
      retries: 10
    labels:
      - homepage.group=Media
      - homepage.name=Jellyfin
      - homepage.icon=jellyfin.png
      - homepage.href=https://jellyfin.${HOSTNAME}
      - homepage.description=Media server
      - homepage.weight=4
      - homepage.widget.type=jellyfin
      - homepage.widget.url=http://jellyfin:8096/jellyfin
      - homepage.widget.key=${JELLYFIN_API_KEY}

  decluttarr:
    image: ghcr.io/manimatter/decluttarr:latest
    container_name: decluttarr
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - RADARR_URL=http://radarr:7878/radarr
      - RADARR_KEY=${RADARR_API_KEY}
      - SONARR_URL=http://sonarr:8989/sonarr
      - SONARR_KEY=${SONARR_API_KEY}
      - LIDARR_URL=http://lidarr:8686/lidarr
      - LIDARR_KEY=${LIDARR_API_KEY}
      - QBITTORRENT_URL=http://qbittorrent:8080
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD}
      - LOG_LEVEL=${DECLUTTARR_LOG_LEVEL:-INFO}
      - TEST_RUN=${DECLUTTARR_TEST_RUN:-False}
      - REMOVE_TIMER=${DECLUTTARR_REMOVE_TIMER:-10}
      - REMOVE_FAILED=${DECLUTTARR_REMOVE_FAILED:-True}
      - REMOVE_FAILED_IMPORTS=${DECLUTTARR_REMOVE_FAILED_IMPORTS:-True}
      - REMOVE_METADATA_MISSING=${DECLUTTARR_REMOVE_METADATA_MISSING:-True}
      - REMOVE_MISSING_FILES=${DECLUTTARR_REMOVE_MISSING_FILES:-True}
      - REMOVE_ORPHANS=${DECLUTTARR_REMOVE_ORPHANS:-True}
      - REMOVE_SLOW=${DECLUTTARR_REMOVE_SLOW:-True}
      - REMOVE_STALLED=${DECLUTTARR_REMOVE_STALLED:-True}
      - REMOVE_UNMONITORED=${DECLUTTARR_REMOVE_UNMONITORED:-True}
      - RUN_PERIODIC_RESCANS=${DECLUTTARR_RUN_PERIODIC_RESCANS:-}
      - PERMITTED_ATTEMPTS=${DECLUTTARR_PERMITTED_ATTEMPTS:-3}
      - NO_STALLED_REMOVAL_QBIT_TAG=${DECLUTTARR_REMOVAL_QBIT_TAG:-"stalled"}
      - MIN_DOWNLOAD_SPEED=${DECLUTTARR_MIN_DOWNLOAD_SPEED:-100}
      - FAILED_IMPORT_MESSAGE_PATTERNS=${DECLUTTARR_FAILED_IMPORT_MESSAGE_PATTERNS:-}
      - IGNORED_DOWNLOAD_CLIENTS=${DECLUTTARR_IGNORED_DOWNLOAD_CLIENTS:-}
    profiles:
      - decluttarr

  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    container_name: watchtower
    deploy:
      resources:
        limits:
          cpus: '2'
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/prowlarr:/config
    networks:
      - default
    ports:
      - 9696:9696
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr.png
      - homepage.href=https://prowlarr.${HOSTNAME}
      - homepage.description=Alerts manager
      - homepage.weight=2
      - homepage.widget.type=prowlarr
      - homepage.widget.url=http://prowlarr:9696
      - homepage.widget.key=${PROWLARR_API_KEY}


  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000 # should be owner of volumes
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT:-.}/navidrome:/data
      - ${DATA_ROOT}/music:/music:ro
      - ${DATA_ROOT}/music_fixed:/music2:ro
    networks:
      - default
    labels:
      - homepage.group=Media
      - homepage.name=Navidrome
      - homepage.icon=navidrome.png
      - homepage.href=https://navidrome.${HOSTNAME}
      - homepage.description=Music server
      - homepage.weight=4
      - homepage.widget.type=navidrome
      - homepage.widget.user=${NAVIDROME_USERNAME}
      - homepage.widget.token=${NAVIDROME_TOKEN}
      - homepage.widget.salt=${NAVIDROME_SALT}
      - homepage.widget.url=http://navidrome:4533
  magiclists:
    extends:
      file: ./magic-lists-for-navidrome/docker-compose.yml
      service: magiclists
    container_name: magiclists
    environment:
      - NAVIDROME_URL=http://navidrome:4533
      - NAVIDROME_USERNAME=${NAVIDROME_USERNAME}
      - NAVIDROME_PASSWORD=${NAVIDROME_PASSWORD}
      - DATABASE_PATH=/app/data/magiclists.db
      - AI_PROVIDER=${AI_PROVIDER:-google}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL:-gemini-2.5-flash}
      - ENABLE_MISSING_RECOMMENDATIONS=${ENABLE_MISSING_RECOMMENDATIONS:-true}
      - APPEND_LIBRARY_MATCHES=${APPEND_LIBRARY_MATCHES:-true}
      - MAX_SUGGESTED_MISSING=${MAX_SUGGESTED_MISSING:-10}
      - ENABLE_LIDARR_INTEGRATION=${ENABLE_LIDARR_INTEGRATION:-false}
      - LIDARR_URL=${LIDARR_URL:-http://lidarr:8686}
      - LIDARR_API_KEY=${LIDARR_API_KEY}
      - LIDARR_ROOT_FOLDER=${LIDARR_ROOT_FOLDER:-}
      - LIDARR_QUALITY_PROFILE_ID=${LIDARR_QUALITY_PROFILE_ID:-}
      - LIDARR_METADATA_PROFILE_ID=${LIDARR_METADATA_PROFILE_ID:-}
      - LIDARR_SEARCH_ON_ADD=${LIDARR_SEARCH_ON_ADD:-true}
      - MUSICBRAINZ_USER_AGENT=${MUSICBRAINZ_USER_AGENT:-MagicLists/1.0}
    volumes:
      - ./magiclists-data:/app/data
    networks:
      - default
    restart: unless-stopped

 # Readarr: The "Lidarr for books" (Automation & Acquisition)
  bookshelf:
    image: ghcr.io/pennydreadful/bookshelf:hardcover
    container_name: bookshelf
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT}/readarr:/config
      - ${DATA_ROOT}/books:/books        # Final library location
      - ${DATA_ROOT}/torrents/books:/data/torrents/books # Where your download client puts files
    ports:
      - 8787:8787
    restart: unless-stopped
    networks:
      - default
    labels:
      - "homepage.group=Books"
      - "homepage.name=Bookshelf"
      - "homepage.icon=readarr.png"
      - "homepage.href=https://bookshelf.${HOSTNAME}" # Replace with your IP/Port
      - "homepage.description=Book Automation"
      - "homepage.widget.type=bookshelf"
      - "homepage.widget.url=http://bookshelf:8787"
      - "homepage.widget.key=YOUR_API_KEY_HERE" # Get from Readarr > Settings > General
  # Calibre: The Engine (Management & Conversion)
  # Readarr connects to Calibre's "Content Server" to add/convert books
  calibre:
    image: lscr.io/linuxserver/calibre:latest
    container_name: calibre
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
    volumes:
      - ${CONFIG_ROOT}/calibre:/config
      - ${DATA_ROOT}/books:/books        # MUST match Readarr's book volume
    ports:
      - 8079:8080 # Desktop GUI (via browser)
      - 8081:8081 # Content Server (for Readarr integration)
    restart: unless-stopped
    networks:
      - default
    labels:
      - "homepage.group=Books"
      - "homepage.name=Calibre"
      - "homepage.icon=calibre.png"
      - "homepage.href=https://calibre.${HOSTNAME}" # Replace with your IP/Port
      - "homepage.description=Ebook Management"
  # Calibre-Web: The Interface (Beautiful UI for reading/browsing)
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=${TIMEZONE}
      - DOCKER_MODS=linuxserver/mods:universal-calibre # Enables ebook conversion
    volumes:
      - ${CONFIG_ROOT}/calibre-web:/config
      - ${DATA_ROOT}/books:/books        # Points to the Calibre database
    ports:
      - 8083:8083
    networks:
      - default
    restart: unless-stopped
    labels:
      - "homepage.group=Books"
      - "homepage.name=Calibre-Web"
      - "homepage.icon=calibre-web.png"
      - "homepage.href=https://calibre-web.${HOSTNAME}" # Replace with your IP/Port
      - "homepage.description=Digital Library UI"
      - "homepage.widget.type=calibreweb"
      - "homepage.widget.url=http://calibre-web:8083" # Use internal container name/port
      - "homepage.widget.username=admin" # Optional: For stats
      - "homepage.widget.password=admin123" # Optional: For stats
networks:
  default:
    name: docker-compose-nas
  vpn_network:
    name: vpn_network
    driver: bridge
